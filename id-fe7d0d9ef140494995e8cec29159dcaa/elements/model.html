										dataElements.push({id:"id-ef839804e88d4bfcac28482f1fd7b79e", type:"Grouping", specialization:decodeURL(""), name:decodeURL("SDM+Repository+-+Source+of+Truth"), documentation:decodeURL("1.+The+Mapping%3A+SDMX+DSD+to+MCP+Tool+Schema%0D%0AThe+most+direct+use+case+is+using+an+SDMX+Data+Structure+Definition+%28DSD%29+to+automatically+generate+the+JSON+Schema+for+an+MCP+tool.%0D%0A%0D%0AMechanism%3A+An+MCP+server+reads+the+SDMX+DSD+for+a+dataset+%28e.g.%2C+%22EU+Unemployment+Rates%22%29.%0D%0A%0D%0AThe+Translation%3A%0D%0A%0D%0ASDMX+Dimensions+%28Country%2C+Frequency%2C+Time%29+become+the+Required+Parameters+in+the+MCP+tool+definition.%0D%0A%0D%0ASDMX+Code+Lists+%28Allowed+country+codes%29+become+Enum+values+in+the+JSON+Schema.%0D%0A%0D%0AThe+Result%3A+When+the+AI+agent+wants+to+query+the+data%2C+the+MCP+protocol+forces+it+to+use+the+exact+dimensions+and+codes+defined+in+the+SDMX+standard%2C+eliminating+hallucinations+of+non-existent+data+points.%0D%0A%0D%0A2.+Contextual+Enrichment+%28Metadata+as+Resources%29%0D%0AIn+MCP%2C+%22Resources%22+are+static+or+dynamic+data+the+AI+can+read+to+understand+context.%0D%0A%0D%0ASDMX+Metadata%3A+You+can+expose+SDMX+Metadata+Structure+Definitions+%28MSD%29+as+MCP+Resources.%0D%0A%0D%0AUsage%3A+Before+the+AI+performs+a+calculation%2C+it+can+%22read%22+the+resource+to+understand+the+methodology+behind+a+number+%28e.g.%2C+%22How+was+%27employment%27+defined+in+this+2026+dataset%3F%22%29.+This+provides+the+AI+with+the+%22technical+empathy%22+needed+to+explain+data+to+a+human+stakeholder+accurately.%0D%0A%0D%0A3.+Verification+%26+Sovereignty+within+Gaia-X%0D%0ASince+you+are+looking+at+Gaia-X+compliant+data+spaces%2C+the+combination+of+SDMX+and+MCP+acts+as+a+%22Trust+Wrapper%22%3A%0D%0A%0D%0APolicy+Enforcement%3A+The+MCP+server+can+act+as+a+Policy+Enforcement+Point+%28PEP%29.+It+checks+if+the+AI+agent+has+the+proper+Gaia-X+credentials+before+translating+a+natural+language+request+into+a+specific+SDMX+query.%0D%0A%0D%0AImmutable+Audit%3A+Because+SDMX+is+highly+structured%2C+every+%22Tool+Call%22+made+via+MCP+can+be+logged+with+high+precision.+You+don%27t+just+log+%22The+AI+asked+for+data%22%3B+you+log+%22The+AI+requested+OBS_VALUE+for+Dimension+X%2C+Y%2C+and+Z%2C%22+creating+a+perfect+audit+trail+for+sovereign+data+usage.%0D%0A%0D%0AArchitectural+Example%3A+The+%22Sovereign+Statistical+Agent%22%0D%0AImagine+a+containerized+environment+%28like+the+AI+compute+environments+you%E2%80%99ve+explored%29+running+an+MCP+Server%3A%0D%0A%0D%0ADiscovery%3A+The+AI+agent+asks+the+MCP+Server%3A+%22What+statistical+data+is+available%3F%22%0D%0A%0D%0AThe+Handshake%3A+The+MCP+Server+sends+back+a+list+of+tools+based+on+SDMX+DSDs.%0D%0A%0D%0AThe+Precise+Query%3A+The+AI+uses+the+get_statistical_data+tool%2C+filling+in+parameters+like+ref_area%3A+%22FR%22+and+freq%3A+%22A%22+%28validated+by+the+SDMX+code+list%29.%0D%0A%0D%0AThe+Delivery%3A+The+MCP+Server+fetches+the+raw+SDMX-ML%2FJSON%2C+simplifies+it+for+the+LLM%2C+and+attaches+the+Attributes+%28like+unit+of+measure%29+as+context+so+the+AI+knows+if+the+number+is+in+%22Millions%22+or+%22Thousands.%22%0D%0A%0D%0AThe+Benefit+for+Enterprise+Architecture%0D%0ABy+using+MCP+to+wrap+SDMX-compliant+sources%2C+you+move+away+from+%22training%22+models+on+data+%28which+risks+data+leakage%29+and+move+toward+federated+querying.+The+data+stays+in+its+sovereign+SDMX+repository%2C+and+the+AI+only+%22sees%22+the+specific+slice+of+the+cube+it+is+authorized+to+access+for+that+specific+task.%0D%0A%0D%0ADoes+this+alignment+between+the+rigid+structure+of+SDMX+and+the+dynamic+nature+of+MCP+fit+into+the+reference+architecture+you%27re+currently+modeling%3F%0D%0A%0D%0ARole%3A+This+is+the+actual+phenomenon+being+measured+%28the+number+itself%29.++%0D%0A%0D%0ACommon+ID%3A+In+most+SDMX+implementations%2C+this+is+identified+as+OBS_VALUE.")});
